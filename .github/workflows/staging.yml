name: Deploy Staging

on:
  push:
    branches:
      - dev

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Apply Firebase Hosting Target
        run: npx firebase-tools target:apply hosting dev campobrancodev --project campobrancodev

      - name: Deploy to Firebase Hosting (Staging)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CAMPOBRANCODEV }}
          projectId: campobrancodev
          channelId: live
          target: dev
        env:
          # Habilita o suporte ao deploy de web frameworks (Next.js) via Firebase CLI
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          # Variáveis de ambiente necessárias para o build interno do Firebase action
          NEXT_PUBLIC_APP_NAME: ${{ vars.NEXT_PUBLIC_APP_NAME }}
          NEXT_PUBLIC_APP_URL: "https://campobrancodev.web.app"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "campobrancodev"
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY_DEV }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN_DEV }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET_DEV }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID_DEV }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_DEV }}
          NEXT_PUBLIC_FIREBASE_DATABASE_ID: "default"
          NEXT_PUBLIC_MASTER_EMAIL: ${{ secrets.MASTER_EMAIL }}
