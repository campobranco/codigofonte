name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Deploy to Firebase Hosting (Production)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CAMPO_BRANCO }}
          projectId: campo-branco
          channelId: live
        env:
          # Habilita o suporte ao deploy de web frameworks (Next.js) via Firebase CLI
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          # Variáveis de ambiente necessárias para o build interno do Firebase action
          NEXT_PUBLIC_APP_NAME: ${{ vars.NEXT_PUBLIC_APP_NAME }}
          NEXT_PUBLIC_APP_URL: "https://campo-branco.web.app"
          # Em produção, o banco com dados é o (default)
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "campo-branco"
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY_PROD }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN_PROD }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET_PROD }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID_PROD }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID_PROD }}
          NEXT_PUBLIC_FIREBASE_DATABASE_ID: "(default)"
          NEXT_PUBLIC_MASTER_EMAIL: ${{ secrets.MASTER_EMAIL }}
