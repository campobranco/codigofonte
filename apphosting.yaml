# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  region: us-central1
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

# Environment variables and secrets.
env:
  # --- Variáveis Públicas (Firebase, VAPID) ---
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "campobrancodev.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "campobrancodev"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "campobrancodev.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "928550834050"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:928550834050:web:adcf6d8895f1b1b22c899b"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_MASTER_EMAIL
    value: "campobrancojw@gmail.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_VAPID_PUBLIC_KEY
    value: "BA7he-Uqiclqp1EtSMW9__Z73UyPogRQfUJxPWeJ5HLQ0N2bYxKqdqfMpmZVmCNPPP6GnCDY"
    availability:
      - BUILD
      - RUNTIME
  
  - variable: NEXT_PUBLIC_FIREBASE_DATABASE_ID
    value: "default"
    availability:
      - BUILD
      - RUNTIME
  
  - variable: NEXT_PUBLIC_DEFAULT_CONGREGATION_ID
    value: "ls-catanduva"
    availability:
      - BUILD
      - RUNTIME
  
  - variable: NEXT_PUBLIC_ENVIRONMENT
    value: "production"
    availability:
      - BUILD
      - RUNTIME
  
  - variable: VAPID_SUBJECT
    value: "mailto:admin@campobranco.web.app"
  - variable: FB_ADMIN_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
  - variable: VAPID_PRIVATE_KEY
